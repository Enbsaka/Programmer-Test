services:
  db:
    image: mysql:8.4
    container_name: programmer-test-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: programmer_test
      MYSQL_USER: programmer_test_user
      MYSQL_PASSWORD: programmer_test_password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
